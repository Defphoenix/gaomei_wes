name: big_wes_pipeline_env
channels:
  - conda-forge
  - bioconda
dependencies:
  # Runtime
  - python=3.10
  - pip
  - openjdk=17

  # FASTQ QC and trimming
  - fastqc
  - fastp
  - seqtk
  - trimmomatic

  # Alignment and BAM/VCF utilities
  - bwa
  - samtools
  - bcftools
  - htslib
  - bedtools

  # Variant calling and annotation
  # Versions validated in the v1.0 real matched-WES regression.
  - gatk4=4.6.2.0
  - picard=3.4.0

  # Coverage, MSI, reporting, compression
  - mosdepth=0.3.14
  - msisensor-pro
  - multiqc
  # GATK AnalyzeCovariates plotting dependencies
  - r-base
  - r-ggplot2
  - r-gplots
  - r-reshape
  - r-gsalib
  - pigz
  - p7zip
  - pyyaml
  - pandas
  - openpyxl
